name: ${COMPOSE_PROJECT_NAME:-optionstacker}

services:
  db:
    image: postgres:16-alpine
    container_name: ${COMPOSE_PROJECT_NAME:-optionstacker}-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    container_name: ${COMPOSE_PROJECT_NAME:-optionstacker}-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ${COMPOSE_PROJECT_NAME:-optionstacker}-backend
    restart: unless-stopped
    env_file:
      - ./backend/.env.docker
    environment:
      ENVIRONMENT: ${ENVIRONMENT:-docker}
      DATABASE_URL_APP: ${DATABASE_URL_APP}
      REDIS_URL: ${REDIS_URL}
      SECRET_KEY: ${SECRET_KEY}
      ALGORITHM: ${ALGORITHM:-HS256}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-15}
      REFRESH_TOKEN_EXPIRE_DAYS: ${REFRESH_TOKEN_EXPIRE_DAYS:-14}
      REFRESH_COOKIE_NAME: ${REFRESH_COOKIE_NAME:-refresh_token}
      REFRESH_COOKIE_SECURE: ${REFRESH_COOKIE_SECURE:-false}
      REFRESH_COOKIE_SAMESITE: ${REFRESH_COOKIE_SAMESITE:-lax}
      REFRESH_COOKIE_DOMAIN: ${REFRESH_COOKIE_DOMAIN:-}
      REFRESH_COOKIE_PATH: ${REFRESH_COOKIE_PATH:-/v1/auth}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:4173}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:4173,http://127.0.0.1:4173}
      RESET_PASSWORD_TOKEN_EXPIRE_MINUTES: ${RESET_PASSWORD_TOKEN_EXPIRE_MINUTES:-60}
      VERIFY_EMAIL_TOKEN_EXPIRE_MINUTES: ${VERIFY_EMAIL_TOKEN_EXPIRE_MINUTES:-1440}
      SENTRY_DSN: ${SENTRY_DSN:-}
      SENTRY_TRACES_SAMPLE_RATE: ${SENTRY_TRACES_SAMPLE_RATE:-0.0}
      BACKEND_PORT: 8000
      RUN_MIGRATIONS: ${RUN_MIGRATIONS:-true}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      - ./shared:/shared
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8000/v1/internal/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:8000}
        VITE_API_VERSION: ${VITE_API_VERSION:-v1}
    container_name: ${COMPOSE_PROJECT_NAME:-optionstacker}-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${FRONTEND_PORT:-4173}:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/ >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10

  scanner:
    build:
      context: ./scanner
      dockerfile: Dockerfile
    container_name: ${COMPOSE_PROJECT_NAME:-optionstacker}-scanner
    restart: unless-stopped
    environment:
      ALPACA_API_KEY: ${ALPACA_API_KEY}
      ALPACA_SECRET_KEY: ${ALPACA_SECRET_KEY}
    volumes:
      - ./shared:/shared
      - ./scanner/tickers:/app/tickers

volumes:
  postgres_data:
  redis_data:
  