name: Build and Push Images

on:
  push:
    branches:
      - develop
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract repo lower
        id: repo
        run: echo "repo=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Set image tag
        id: meta
        run: |
          if [ "${GITHUB_REF_NAME}" = "main" ]; then
            echo "channel=latest" >> $GITHUB_OUTPUT
          else
            echo "channel=develop" >> $GITHUB_OUTPUT
          fi

      - name: Build and push backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          provenance: false
          sbom: false
          tags: |
            ghcr.io/${{ steps.repo.outputs.repo }}/backend:${{ steps.meta.outputs.channel }}
            ghcr.io/${{ steps.repo.outputs.repo }}/backend:${{ github.sha }}

      - name: Build and push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          provenance: false
          sbom: false
          build-args: |
            VITE_API_URL=${{ vars.VITE_API_URL }}
            VITE_API_VERSION=${{ vars.VITE_API_VERSION }}
            VITE_REGISTRATION_ENABLED=${{ vars.VITE_REGISTRATION_ENABLED }}
          tags: |
            ghcr.io/${{ steps.repo.outputs.repo }}/frontend:${{ steps.meta.outputs.channel }}
            ghcr.io/${{ steps.repo.outputs.repo }}/frontend:${{ github.sha }}

      - name: Build and push scanner
        uses: docker/build-push-action@v6
        with:
          context: ./scanner
          push: true
          provenance: false
          sbom: false
          tags: |
            ghcr.io/${{ steps.repo.outputs.repo }}/scanner:${{ steps.meta.outputs.channel }}
            ghcr.io/${{ steps.repo.outputs.repo }}/scanner:${{ github.sha }}
