name: Build and Push Images

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract repo lower
        id: repo
        run: echo "repo=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Build and push backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          no-cache: true
          pull: true
          provenance: false
          sbom: false
          tags: |
            ghcr.io/${{ steps.repo.outputs.repo }}/backend:latest
            ghcr.io/${{ steps.repo.outputs.repo }}/backend:${{ github.sha }}

      - name: Build and push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          no-cache: true
          pull: true
          provenance: false
          sbom: false
          build-args: |
            VITE_API_URL=${{ vars.VITE_API_URL }}
            VITE_API_VERSION=${{ vars.VITE_API_VERSION || 'v1' }}
          tags: |
            ghcr.io/${{ steps.repo.outputs.repo }}/frontend:latest
            ghcr.io/${{ steps.repo.outputs.repo }}/frontend:${{ github.sha }}
