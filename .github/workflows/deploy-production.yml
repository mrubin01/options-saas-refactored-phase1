name: Deploy Production

on:
  workflow_dispatch:

permissions:
  contents: read
  packages: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Deploy on server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            mkdir -p ~/options-saas/deploy
            mkdir -p ~/options-saas/shared
            mkdir -p ~/options-saas/scanner/tickers

            cat > ~/options-saas/deploy/docker-compose.remote.yml <<'EOF'
            name: optionstacker-production

            services:
              db:
                image: postgres:16-alpine
                restart: unless-stopped
                environment:
                  POSTGRES_DB: ${POSTGRES_DB}
                  POSTGRES_USER: ${POSTGRES_USER}
                  POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
                volumes:
                  - postgres_data:/var/lib/postgresql/data
                healthcheck:
                  test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
                  interval: 10s
                  timeout: 5s
                  retries: 20

              redis:
                image: redis:7-alpine
                restart: unless-stopped
                command: ["redis-server", "--appendonly", "yes"]
                volumes:
                  - redis_data:/data
                healthcheck:
                  test: ["CMD", "redis-cli", "ping"]
                  interval: 10s
                  timeout: 5s
                  retries: 20

              backend:
                image: ${BACKEND_IMAGE}
                restart: unless-stopped
                environment:
                  ENVIRONMENT: production
                  DATABASE_URL_APP: ${DATABASE_URL_APP}
                  REDIS_URL: ${REDIS_URL}
                  SECRET_KEY: ${SECRET_KEY}
                  ALGORITHM: ${ALGORITHM}
                  ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES}
                  REFRESH_TOKEN_EXPIRE_DAYS: ${REFRESH_TOKEN_EXPIRE_DAYS}
                  REFRESH_COOKIE_NAME: ${REFRESH_COOKIE_NAME}
                  REFRESH_COOKIE_SECURE: ${REFRESH_COOKIE_SECURE}
                  REFRESH_COOKIE_SAMESITE: ${REFRESH_COOKIE_SAMESITE}
                  REFRESH_COOKIE_DOMAIN: ${REFRESH_COOKIE_DOMAIN}
                  REFRESH_COOKIE_PATH: ${REFRESH_COOKIE_PATH}
                  FRONTEND_URL: ${FRONTEND_URL}
                  CORS_ORIGINS: ${CORS_ORIGINS}
                  RESET_PASSWORD_TOKEN_EXPIRE_MINUTES: ${RESET_PASSWORD_TOKEN_EXPIRE_MINUTES}
                  VERIFY_EMAIL_TOKEN_EXPIRE_MINUTES: ${VERIFY_EMAIL_TOKEN_EXPIRE_MINUTES}
                  RESEND_API_KEY: ${RESEND_API_KEY}
                  EMAIL_FROM: ${EMAIL_FROM}
                  SENTRY_DSN: ${SENTRY_DSN}
                  SENTRY_TRACES_SAMPLE_RATE: ${SENTRY_TRACES_SAMPLE_RATE}
                  BACKEND_PORT: 8000
                  RUN_MIGRATIONS: true
                  REGISTRATION_ENABLED: ${REGISTRATION_ENABLED}
                depends_on:
                  db:
                    condition: service_healthy
                  redis:
                    condition: service_healthy
                volumes:
                  - ~/options-saas/shared:/shared
                healthcheck:
                  test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/v1/internal/health')\" 2>/dev/null"]
                  interval: 15s
                  timeout: 5s
                  retries: 10

              frontend:
                image: ${FRONTEND_IMAGE}
                restart: unless-stopped
                depends_on:
                  backend:
                    condition: service_healthy
                healthcheck:
                  test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/health || exit 1"]
                  interval: 15s
                  timeout: 5s
                  retries: 10

              caddy:
                image: caddy:2-alpine
                restart: unless-stopped
                ports:
                  - "80:80"
                  - "443:443"
                  - "443:443/udp"
                volumes:
                  - ./Caddyfile:/etc/caddy/Caddyfile:ro
                  - caddy_data:/data
                  - caddy_config:/config
                depends_on:
                  frontend:
                    condition: service_healthy

              ingester:
                image: ${BACKEND_IMAGE}
                restart: unless-stopped
                entrypoint: ["python", "ingestion/watcher.py"]
                environment:
                  DATABASE_URL_APP: ${DATABASE_URL_APP}
                  PYTHONPATH: /app
                depends_on:
                  db:
                    condition: service_healthy
                volumes:
                  - ~/options-saas/shared:/shared

              scanner:
                image: ${SCANNER_IMAGE}
                restart: unless-stopped
                environment:
                  ALPACA_API_KEY: ${ALPACA_API_KEY}
                  ALPACA_SECRET_KEY: ${ALPACA_SECRET_KEY}
                volumes:
                  - ~/options-saas/shared:/shared
                  - ~/options-saas/scanner/tickers:/app/tickers

            volumes:
              postgres_data:
              redis_data:
              caddy_data:
              caddy_config:
            EOF

            cat > ~/options-saas/.env <<'EOF'
            POSTGRES_DB=${{ secrets.POSTGRES_DB }}
            POSTGRES_USER=${{ secrets.POSTGRES_USER }}
            POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}

            DATABASE_URL_APP=${{ secrets.DATABASE_URL_APP }}
            REDIS_URL=${{ secrets.REDIS_URL }}

            SECRET_KEY=${{ secrets.SECRET_KEY }}
            ALGORITHM=${{ secrets.ALGORITHM }}
            ACCESS_TOKEN_EXPIRE_MINUTES=${{ secrets.ACCESS_TOKEN_EXPIRE_MINUTES }}
            REFRESH_TOKEN_EXPIRE_DAYS=${{ secrets.REFRESH_TOKEN_EXPIRE_DAYS }}

            REFRESH_COOKIE_NAME=${{ secrets.REFRESH_COOKIE_NAME }}
            REFRESH_COOKIE_SECURE=${{ secrets.REFRESH_COOKIE_SECURE }}
            REFRESH_COOKIE_SAMESITE=${{ secrets.REFRESH_COOKIE_SAMESITE }}
            REFRESH_COOKIE_DOMAIN=${{ secrets.REFRESH_COOKIE_DOMAIN }}
            REFRESH_COOKIE_PATH=${{ secrets.REFRESH_COOKIE_PATH }}

            FRONTEND_URL=${{ secrets.FRONTEND_URL }}
            CORS_ORIGINS=${{ secrets.CORS_ORIGINS }}

            RESET_PASSWORD_TOKEN_EXPIRE_MINUTES=${{ secrets.RESET_PASSWORD_TOKEN_EXPIRE_MINUTES }}
            VERIFY_EMAIL_TOKEN_EXPIRE_MINUTES=${{ secrets.VERIFY_EMAIL_TOKEN_EXPIRE_MINUTES }}

            RESEND_API_KEY=${{ secrets.RESEND_API_KEY }}
            EMAIL_FROM=${{ secrets.EMAIL_FROM }}

            SENTRY_DSN=${{ secrets.SENTRY_DSN }}
            SENTRY_TRACES_SAMPLE_RATE=${{ secrets.SENTRY_TRACES_SAMPLE_RATE }}

            REGISTRATION_ENABLED=${{ secrets.REGISTRATION_ENABLED }}

            BACKEND_IMAGE=${{ secrets.BACKEND_IMAGE }}
            FRONTEND_IMAGE=${{ secrets.FRONTEND_IMAGE }}
            SCANNER_IMAGE=${{ secrets.SCANNER_IMAGE }}

            ALPACA_API_KEY=${{ secrets.ALPACA_API_KEY }}
            ALPACA_SECRET_KEY=${{ secrets.ALPACA_SECRET_KEY }}
            EOF

            cat > ~/options-saas/deploy/Caddyfile <<'CADDYEOF'
            {
                email mi.rubino@protonmail.com
            }

            optionstacker.com {
                reverse_proxy frontend:80
            }

            www.optionstacker.com {
                redir https://optionstacker.com{uri} permanent
            }
            CADDYEOF

            mkdir -p ~/options-saas/scripts

            cat > ~/options-saas/scripts/prod-ingest.sh <<'INGESTEOF'
            #!/bin/bash
            set -euo pipefail

            APP_DIR="$HOME/options-saas"
            COMPOSE="docker compose --env-file $APP_DIR/.env -f $APP_DIR/deploy/docker-compose.remote.yml"
            LOG_DIR="$APP_DIR/logs"

            mkdir -p "$LOG_DIR"

            echo "[$(date)] Starting ingestion"

            $COMPOSE exec -T backend python -m ingestion.covered_calls
            $COMPOSE exec -T backend python -m ingestion.put_options
            $COMPOSE exec -T backend python -m ingestion.spread_options

            echo "[$(date)] Ingestion completed"
            INGESTEOF

            chmod +x ~/options-saas/scripts/prod-ingest.sh

            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u "${{ secrets.GHCR_USERNAME }}" --password-stdin

            cd ~/options-saas
            docker compose --env-file ~/options-saas/.env -f deploy/docker-compose.remote.yml pull
            docker compose --env-file ~/options-saas/.env -f deploy/docker-compose.remote.yml up -d
  