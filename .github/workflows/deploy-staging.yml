name: Deploy Staging

on:
  workflow_dispatch:

permissions:
  contents: read
  packages: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - name: Deploy on server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            mkdir -p ~/options-saas/deploy
            mkdir -p ~/options-saas/shared/data

            cat > ~/options-saas/deploy/docker-compose.remote.yml <<'EOF'
            services:
              db:
                image: postgres:16-alpine
                restart: unless-stopped
                environment:
                  POSTGRES_DB: ${POSTGRES_DB}
                  POSTGRES_USER: ${POSTGRES_USER}
                  POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
                volumes:
                  - postgres_data:/var/lib/postgresql/data
                healthcheck:
                  test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
                  interval: 10s
                  timeout: 5s
                  retries: 20

              redis:
                image: redis:7-alpine
                restart: unless-stopped
                volumes:
                  - redis_data:/data
                healthcheck:
                  test: ["CMD", "redis-cli", "ping"]
                  interval: 10s
                  timeout: 5s
                  retries: 20

              backend:
                image: ${BACKEND_IMAGE}
                restart: unless-stopped
                environment:
                  DATABASE_URL_ADMIN: ${DATABASE_URL_ADMIN}
                  DATABASE_URL_APP: ${DATABASE_URL_APP}
                  REDIS_URL: ${REDIS_URL}
                  APP_ENV: ${APP_ENV}
                  SECRET_KEY: ${SECRET_KEY}
                  ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES}
                  CORS_ORIGINS: ${CORS_ORIGINS}
                depends_on:
                  db:
                    condition: service_healthy
                  redis:
                    condition: service_healthy
                ports:
                  - "8000:8000"
                volumes:
                  - ~/options-saas/shared:/shared

              frontend:
                image: ${FRONTEND_IMAGE}
                restart: unless-stopped
                depends_on:
                  - backend
                ports:
                  - "80:80"

            volumes:
              postgres_data:
              redis_data:
            EOF

            cat > ~/options-saas/.env <<'EOF'
            POSTGRES_DB=${{ secrets.POSTGRES_DB }}
            POSTGRES_USER=${{ secrets.POSTGRES_USER }}
            POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
            DATABASE_URL_ADMIN=${{ secrets.DATABASE_URL_ADMIN }}
            DATABASE_URL_APP=${{ secrets.DATABASE_URL_APP }}
            REDIS_URL=${{ secrets.REDIS_URL }}
            APP_ENV=staging
            SECRET_KEY=${{ secrets.SECRET_KEY }}
            ACCESS_TOKEN_EXPIRE_MINUTES=${{ secrets.ACCESS_TOKEN_EXPIRE_MINUTES }}
            CORS_ORIGINS=${{ secrets.CORS_ORIGINS }}
            BACKEND_IMAGE=${{ secrets.BACKEND_IMAGE }}
            FRONTEND_IMAGE=${{ secrets.FRONTEND_IMAGE }}
            EOF

            cd ~/options-saas
            ls -la
            ls -la deploy
            docker compose --env-file ~/options-saas/.env -f deploy/docker-compose.remote.yml pull
            docker compose --env-file ~/options-saas/.env -f deploy/docker-compose.remote.yml up -d
