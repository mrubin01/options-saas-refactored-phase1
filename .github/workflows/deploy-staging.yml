name: Deploy Staging

on:
  workflow_dispatch:

permissions:
  contents: read
  packages: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: staging

    steps:
      - uses: actions/checkout@v4

      - name: Deploy on server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            mkdir -p ~/options-saas/deploy
            mkdir -p ~/options-saas/shared

            cat > ~/options-saas/deploy/docker-compose.remote.yml <<'EOF'
            name: optionstacker-staging

            services:
              db:
                image: postgres:16-alpine
                restart: unless-stopped
                environment:
                  POSTGRES_DB: ${POSTGRES_DB}
                  POSTGRES_USER: ${POSTGRES_USER}
                  POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
                volumes:
                  - postgres_data:/var/lib/postgresql/data
                healthcheck:
                  test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
                  interval: 10s
                  timeout: 5s
                  retries: 20

              redis:
                image: redis:7-alpine
                restart: unless-stopped
                command: ["redis-server", "--appendonly", "yes"]
                volumes:
                  - redis_data:/data
                healthcheck:
                  test: ["CMD", "redis-cli", "ping"]
                  interval: 10s
                  timeout: 5s
                  retries: 20

              backend:
                image: ${BACKEND_IMAGE}
                restart: unless-stopped
                environment:
                  ENVIRONMENT: staging
                  DATABASE_URL_APP: ${DATABASE_URL_APP}
                  REDIS_URL: ${REDIS_URL}
                  SECRET_KEY: ${SECRET_KEY}
                  ALGORITHM: ${ALGORITHM}
                  ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES}
                  REFRESH_TOKEN_EXPIRE_DAYS: ${REFRESH_TOKEN_EXPIRE_DAYS}
                  REFRESH_COOKIE_NAME: ${REFRESH_COOKIE_NAME}
                  REFRESH_COOKIE_SECURE: ${REFRESH_COOKIE_SECURE}
                  REFRESH_COOKIE_SAMESITE: ${REFRESH_COOKIE_SAMESITE}
                  REFRESH_COOKIE_DOMAIN: ${REFRESH_COOKIE_DOMAIN}
                  REFRESH_COOKIE_PATH: ${REFRESH_COOKIE_PATH}
                  FRONTEND_URL: ${FRONTEND_URL}
                  CORS_ORIGINS: ${CORS_ORIGINS}
                  RESET_PASSWORD_TOKEN_EXPIRE_MINUTES: ${RESET_PASSWORD_TOKEN_EXPIRE_MINUTES}
                  VERIFY_EMAIL_TOKEN_EXPIRE_MINUTES: ${VERIFY_EMAIL_TOKEN_EXPIRE_MINUTES}
                  SENTRY_DSN: ${SENTRY_DSN}
                  SENTRY_TRACES_SAMPLE_RATE: ${SENTRY_TRACES_SAMPLE_RATE}
                  BACKEND_PORT: 8000
                  RUN_MIGRATIONS: true
                depends_on:
                  db:
                    condition: service_healthy
                  redis:
                    condition: service_healthy
                ports:
                  - "8000:8000"
                volumes:
                  - ~/options-saas/shared:/shared
                healthcheck:
                  test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8000/v1/internal/health || exit 1"]
                  interval: 15s
                  timeout: 5s
                  retries: 10

              frontend:
                image: ${FRONTEND_IMAGE}
                restart: unless-stopped
                depends_on:
                  backend:
                    condition: service_healthy
                ports:
                  - "80:80"
                healthcheck:
                  test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/health || exit 1"]
                  interval: 15s
                  timeout: 5s
                  retries: 10

            volumes:
              postgres_data:
              redis_data:
            EOF

            cat > ~/options-saas/.env <<'EOF'
            POSTGRES_DB=${{ secrets.POSTGRES_DB }}
            POSTGRES_USER=${{ secrets.POSTGRES_USER }}
            POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}

            DATABASE_URL_APP=${{ secrets.DATABASE_URL_APP }}
            REDIS_URL=${{ secrets.REDIS_URL }}

            SECRET_KEY=${{ secrets.SECRET_KEY }}
            ALGORITHM=${{ secrets.ALGORITHM }}
            ACCESS_TOKEN_EXPIRE_MINUTES=${{ secrets.ACCESS_TOKEN_EXPIRE_MINUTES }}
            REFRESH_TOKEN_EXPIRE_DAYS=${{ secrets.REFRESH_TOKEN_EXPIRE_DAYS }}

            REFRESH_COOKIE_NAME=${{ secrets.REFRESH_COOKIE_NAME }}
            REFRESH_COOKIE_SECURE=${{ secrets.REFRESH_COOKIE_SECURE }}
            REFRESH_COOKIE_SAMESITE=${{ secrets.REFRESH_COOKIE_SAMESITE }}
            REFRESH_COOKIE_DOMAIN=${{ secrets.REFRESH_COOKIE_DOMAIN }}
            REFRESH_COOKIE_PATH=${{ secrets.REFRESH_COOKIE_PATH }}

            FRONTEND_URL=${{ secrets.FRONTEND_URL }}
            CORS_ORIGINS=${{ secrets.CORS_ORIGINS }}

            RESET_PASSWORD_TOKEN_EXPIRE_MINUTES=${{ secrets.RESET_PASSWORD_TOKEN_EXPIRE_MINUTES }}
            VERIFY_EMAIL_TOKEN_EXPIRE_MINUTES=${{ secrets.VERIFY_EMAIL_TOKEN_EXPIRE_MINUTES }}

            SENTRY_DSN=${{ secrets.SENTRY_DSN }}
            SENTRY_TRACES_SAMPLE_RATE=${{ secrets.SENTRY_TRACES_SAMPLE_RATE }}

            BACKEND_IMAGE=${{ secrets.BACKEND_IMAGE }}
            FRONTEND_IMAGE=${{ secrets.FRONTEND_IMAGE }}
            EOF

            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u "${{ secrets.GHCR_USERNAME }}" --password-stdin

            cd ~/options-saas
            docker compose --env-file ~/options-saas/.env -f deploy/docker-compose.remote.yml pull
            docker compose --env-file ~/options-saas/.env -f deploy/docker-compose.remote.yml up -d
